<oui-header
    class="mb-3"
    heading="{{:: 'domains_newdnszone_order_title' | translate }}"
    description="{{:: 'domains_newdnszone_order_subtitle' | translate }}"
>
    <oui-guide-menu data-text="{{:: 'guide_domain_subtitle' | translate }}">
        <oui-guide-menu-item href="{{ $ctrl.GUIDE_URL }}" external>
            <span data-translate="domains_newdnszone_order_help_add"></span>
        </oui-guide-menu-item>
    </oui-guide-menu>
</oui-header>

<div
    data-ng-attr-id="{{:: $ctrl.constructor.getAlerterId($ctrl.alerts.main)}}"
    data-ovh-alert="{{$ctrl.alerts.main}}"
></div>
<p data-translate="domains_newdnszone_order_example"></p>
<p class="font-italic" data-translate="domains_newdnszone_order_usage"></p>

<oui-message data-type="warning">
    <span data-translate="domains_newdnszone_order_reminder"></span>
</oui-message>

<!-- Section: domain name input + validation -->
<oui-field
    class="mt-4"
    data-label="{{:: 'domains_newdnszone_order_step1_zonename' | translate }}"
>
    <input
        class="oui-input mb-2"
        type="text"
        id="dnsZoneName"
        name="dnsZoneName"
        data-ng-model="$ctrl.configuration.zone"
        data-ng-change="$ctrl.checkZoneName()"
        data-ng-model-options="{ debounce: 300 }"
        maxlength="253"
        required
    />
    <div class="d-flex align-items-center" data-ng-if="$ctrl.isLoading">
        <oui-spinner size="s"></oui-spinner>
        <span
            class="ml-2"
            data-translate="domains_newdnszone_order_step1_zonename_pending"
        ></span>
    </div>
</oui-field>

<!-- Validation errors, shown as panels aligned with the warning above -->
<oui-message
    class="mt-2"
    data-type="error"
    data-ng-if="$ctrl.configuration.zone && !$ctrl.zoneNameisValid && !$ctrl.isLoading && $ctrl.zoneNameError === 'zone_exists'"
>
    <span data-translate="domains_newdnszone_zone_exists"></span>
</oui-message>

<oui-message
    class="mt-2"
    data-type="warning"
    data-ng-if="$ctrl.configuration.zone && !$ctrl.zoneNameisValid && !$ctrl.isLoading && $ctrl.zoneNameError !== 'zone_exists'"
>
    <div>
        <span data-translate="domains_newdnszone_zone_invalid_title"></span>
        <ul class="mb-0">
            <li data-translate="domains_newdnszone_zone_invalid_domain_active"></li>
            <li data-translate="domains_newdnszone_zone_invalid_domain_soa"></li>
            <li data-translate="domains_newdnszone_zone_invalid_domain_a"></li>
            <li data-translate="domains_newdnszone_zone_invalid_domain_zone"></li>
        </ul>
    </div>
</oui-message>

<!-- Sections shown once the zone name is valid -->
<div data-ng-if="$ctrl.zoneNameisValid && !$ctrl.isLoading">
    <!-- Section: options -->
    <section class="mt-5">
        <h2 data-translate="domains_newdnszone_order_options_title"></h2>

        <div class="row mt-3">
            <!-- DNS Anycast -->
            <div class="col-md-6 mb-3">
                <div class="oui-tile h-100">
                    <oui-checkbox
                        id="anycast"
                        data-model="$ctrl.options.anycast"
                        data-description="{{:: 'domains_newdnszone_order_option_anycast_description' | translate }}"
                    >
                        <span
                            data-translate="domains_newdnszone_order_option_anycast_label"
                        ></span>
                    </oui-checkbox>
                    <ovh-manager-catalog-price
                        data-ng-if="$ctrl.anycastPrice"
                        class="d-block mt-2"
                        data-price="$ctrl.anycastPrice"
                        data-user="$ctrl.user"
                    ></ovh-manager-catalog-price>
                </div>
            </div>

            <!-- DNSSEC (only when available for the domain extension) -->
            <div class="col-md-6 mb-3" data-ng-if="$ctrl.dnssecAvailable">
                <div class="oui-tile h-100">
                    <oui-checkbox
                        id="dnssec"
                        data-model="$ctrl.options.dnssec"
                        data-description="{{:: 'domains_newdnszone_order_option_dnssec_description' | translate }}"
                    >
                        <span
                            data-translate="domains_newdnszone_order_option_dnssec_label"
                        ></span>
                    </oui-checkbox>
                    <span
                        class="d-block mt-2 font-weight-bold"
                        data-translate="domains_newdnszone_order_option_dnssec_included"
                    ></span>
                </div>
            </div>
        </div>
    </section>

    <!-- Section: duration -->
    <section class="mt-4">
        <h2 data-translate="domains_newdnszone_order_duration_title"></h2>

        <div class="row mt-3">
            <div class="col-md-6 mb-3">
                <div class="oui-tile h-100">
                    <oui-radio-group data-model="$ctrl.commitmentDuration">
                        <oui-radio data-value="'12'" disabled="true">
                            <span
                                data-translate="domains_newdnszone_order_duration_value"
                            ></span>
                        </oui-radio>
                    </oui-radio-group>
                </div>
            </div>
        </div>

        <p class="mt-2" data-ng-if="$ctrl.options.anycast">
            <span
                data-translate="domains_newdnszone_order_duration_anycast_renewal_prefix"
            ></span>
            <ovh-manager-catalog-price
                class="d-inline"
                data-price="$ctrl.anycastPrice"
                data-user="$ctrl.user"
            ></ovh-manager-catalog-price>
            <span
                data-translate="domains_newdnszone_order_duration_anycast_renewal_suffix"
            ></span>
        </p>
    </section>

    <div class="mt-4">
        <oui-button
            data-variant="primary"
            data-on-click="$ctrl.order()"
        >
            <span data-translate="domains_newdnszone_order_submit"></span>
        </oui-button>
    </div>
</div>
