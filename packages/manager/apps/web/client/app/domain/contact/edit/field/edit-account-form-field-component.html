<div
    class="pt-2"
    data-ng-class="{ 'oui-field': $ctrl.rule.hasBottomMargin,
                    'col-sm-12': $ctrl.rule.label !== $ctrl.FIELD_NAME_LIST.city && $ctrl.rule.label !== $ctrl.FIELD_NAME_LIST.zip,
                    'col-sm-6': $ctrl.rule.label === $ctrl.FIELD_NAME_LIST.city || $ctrl.rule.label === $ctrl.FIELD_NAME_LIST.zip,
                    'oui-field mb-0': !$ctrl.rule.hasBottomMargin,
                    'oui-field_error': $ctrl.isInvalid()
    }"
>
    <div class="oui-field__header" data-ng-if="$ctrl.shouldDisplayLabel()">
        <label
            class="oui-field__label"
            data-ng-bind=":: $ctrl.getLabelTranslation()"
        ></label>
    </div>
    <div class="oui-field__control">
        <!-- TEXT INPUT -->
        <input
            data-ng-if="$ctrl.getFieldType() === 'text'"
            type="text"
            class="oui-input"
            data-ng-attr-id="{{ 'ovh_field_' + $ctrl.rule.label }}"
            data-ng-attr-name="{{ 'ovh_field_' + $ctrl.rule.label }}"
            data-ng-model="$ctrl.value"
            data-ng-model-options="{ debounce: $ctrl.debounce }"
            data-ng-change="$ctrl.onChange()"
            data-ng-focus="$ctrl.focused = true"
            data-ng-blur="$ctrl.focused = false"
            data-ng-pattern="$ctrl.inputValidator"
            data-ng-disabled="$ctrl.disableInputField"
            data-ng-required="$ctrl.rule.mandatory"
            data-maxlength="$ctrl.rule.maxLength"
        />

        <!-- READONLY TEXT INPUT -->
        <input
            data-ng-if="$ctrl.getFieldType() === 'text-readonly'"
            type="text"
            class="oui-input"
            readonly
            data-ng-attr-id="{{ 'ovh_field_' + $ctrl.rule.label }}"
            data-ng-attr-name="{{ 'ovh_field_' + $ctrl.rule.label }}"
            data-ng-model="$ctrl.value"
            data-ng-model-options="{ debounce: $ctrl.debounce }"
            data-ng-change="$ctrl.onChange()"
            data-ng-focus="$ctrl.focused = true"
            data-ng-blur="$ctrl.focused = false"
            data-ng-pattern="$ctrl.inputValidator"
            data-ng-disabled="$ctrl.disableInputField"
            data-ng-required="$ctrl.rule.mandatory"
            data-maxlength="$ctrl.rule.maxLength"
        />

        <!-- SELECT INPUT -->
        <oui-select
            data-ng-if="$ctrl.getFieldType() === 'select'"
            items="$ctrl.getTranslatedEnums()"
            match="translated"
            model="$ctrl.value"
            data-ng-attr-id="{{ 'ovh_field_' + $ctrl.rule.label }}"
            data-ng-attr-name="{{ 'ovh_field_' + $ctrl.rule.label }}"
            on-change="$ctrl.onChange()"
            data-ng-focus="$ctrl.focused = true"
            data-ng-blur="$ctrl.focused = false"
            data-ng-pattern="$ctrl.inputValidator"
            data-ng-required="$ctrl.rule.mandatory"
            disabled="$ctrl.disableDropDownSelection"
            searchable
        >
        </oui-select>

        <!-- DATE PICKER INPUT -->
        <oui-calendar
            data-ng-if="$ctrl.getFieldType() === 'date'"
            data-alt-format="{{ $ctrl.dateFormat() }}"
            placeholder="{{ 'domain_tab_CONTACT_edit_form_field_date_placeholder' | translate }}"
            data-ng-attr-id="{{ 'ovh_field_' + $ctrl.rule.label }}"
            data-ng-attr-name="{{ 'ovh_field_' + $ctrl.rule.label }}"
            model="$ctrl.value"
            model-options="{ debounce: $ctrl.debounce }"
            on-change="$ctrl.onChange()"
            data-ng-focus="$ctrl.focused = true"
            data-ng-blur="$ctrl.focused = false"
            data-ng-pattern="$ctrl.inputValidator"
            data-ng-required="$ctrl.rule.mandatory"
            week-numbers="false"
            data-options="{
                    showWeeks: false,
                    defaultDate: $ctrl.value,
                    monthSelectorType: 'dropdown'
                }"
        >
        </oui-calendar>

        <!-- PHONE INPUT -->

        <div
            class="oui-input-group phone-number-field d-flex align-items-stretch"
            data-ng-if="$ctrl.getFieldType() === $ctrl.FIELD_NAME_LIST.phone"
        >
            <ui-select
                data-ng-model="$ctrl.phoneCountry.country"
                data-on-select="$ctrl.onPhonePrefixChange()"
                theme="ui-select-oui-kit"
            >
                <ui-select-match>
                    <country-flag
                        data-country="$select.selected.country"
                        data-label="+{{ $select.selected.prefix }}"
                    ></country-flag>
                </ui-select-match>
                <ui-select-choices
                    data-repeat="phoneCountry.country as phoneCountry in ($ctrl.phoneCountryList | filter: $select.search) track by $index"
                >
                    <country-flag
                        data-country="phoneCountry.country"
                        data-label="{{ phoneCountry.label + ' (+' + phoneCountry.prefix + ')' }}"
                    >
                    </country-flag>
                </ui-select-choices>
            </ui-select>
            <input
                type="text"
                class="oui-input oui-input_phone m-0"
                data-ng-attr-id="{{ 'ovh_field_' + $ctrl.rule.label }}"
                data-ng-attr-name="{{ 'ovh_field_' + $ctrl.rule.label }}"
                data-ng-model="$ctrl.value"
                data-ng-model-options="{ debounce: $ctrl.debounce }"
                data-ng-required="$ctrl.rule.mandatory"
                data-ng-attr-placeholder="{{ $ctrl.phonePlaceHolder }}"
                data-ng-change="$ctrl.onChange()"
                data-ng-focus="$ctrl.focused = true"
                data-ng-blur="$ctrl.focused = false"
                data-ng-pattern="$ctrl.inputValidator"
                data-maxlength="$ctrl.rule.maxLength"
            />
        </div>

        <input
            data-ng-if="$ctrl.getFieldType() === $ctrl.FIELD_NAME_LIST.email"
            type="email"
            class="oui-input"
            data-ng-attr-id="{{ 'ovh_field_' + $ctrl.rule.label }}"
            data-ng-attr-name="{{ 'ovh_field_' + $ctrl.rule.label }}"
            data-ng-model="$ctrl.value"
            data-ng-model-options="{ debounce: $ctrl.debounce }"
            data-ng-change="$ctrl.onChange()"
            data-ng-focus="$ctrl.focused = true"
            data-ng-blur="$ctrl.focused = false"
            data-ng-pattern="$ctrl.inputValidator"
            data-ng-required="$ctrl.rule.mandatory"
            data-maxlength="$ctrl.rule.maxLength"
        />

        <b
            data-translate="domain_tab_CONTACT_edit_form_change_owner"
            data-ng-if="[$ctrl.FIELD_NAME_LIST.email, $ctrl.FIELD_NAME_LIST.firstname].includes($ctrl.rule.label)"
        ></b>

        <p
            class="help-block text-danger"
            role="alert"
            data-ng-if="$ctrl.fieldset['ovh_field_' + $ctrl.rule.label].$error.required"
            data-translate="domain_tab_CONTACT_edit_form_required_error"
        ></p>
        <p
            class="help-block text-danger"
            role="alert"
            data-ng-if="$ctrl.fieldset['ovh_field_' + $ctrl.rule.label].$error.pattern"
            data-translate="domain_tab_CONTACT_edit_form_pattern_error"
        ></p>
        <p
            class="help-block text-danger"
            role="alert"
            data-ng-if="$ctrl.fieldset['ovh_field_' + $ctrl.rule.label].$error.emailAvailable && $ctrl.value"
            data-translate="domain_tab_CONTACT_edit_form_email_in_use"
        ></p>

    </div>
</div>
