<div class="row">
    <div class="w-100">
        <oui-back-button data-on-click="$ctrl.onPreviousPageClick()">
        </oui-back-button>

        <!--Title + description-->
        <div class="ml-2">
            <span
                class="oui-heading_4"
                data-translate="hosting_order_upgrade_modal_header"
            ></span>
            <p
                data-translate="hosting_order_upgrade_modal_header_description"
            ></p>
        </div>

        <oui-spinner
            data-size="l"
            data-ng-if="$ctrl.loading.availableOffers || $ctrl.loading.validation"
        >
        </oui-spinner>

        <oui-message
            data-type="warning"
            data-ng-if="!$ctrl.loading.availableOffers
                      && !$ctrl.loading.validation
                      && $ctrl.availableOffers.length === 0"
        >
            <span data-translate="hosting_order_upgrade_no_offer"></span>
        </oui-message>

        <!-- ═══════════════════════════════════════════════════════════ -->
        <!-- NEW LAYOUT: 2-column with sticky summary (feature flag)   -->
        <!-- ═══════════════════════════════════════════════════════════ -->
        <div
            data-ng-if="$ctrl.useNewOffers
                        && !$ctrl.loading.availableOffers
                        && !$ctrl.loading.validation
                        && $ctrl.availableOffers.length > 0"
            style="display: flex; gap: 24px; align-items: flex-start;"
        >
            <!-- LEFT: Stepper -->
            <div style="flex: 1; min-width: 0;">
                <oui-stepper data-on-finish="$ctrl.orderUpgrade()">
                    <oui-step-form
                        data-header="{{:: 'hosting_order_upgrade_step_header_offer' | translate }}"
                        data-valid="$ctrl.model.offer"
                        data-prevent-next="true"
                        data-on-submit="$ctrl.onOfferNextStepClick()"
                    >
                        <web-component-hosting-domain-offers
                            data-ng-if="$ctrl.catalog"
                            data-user="$ctrl.user"
                            data-catalog="$ctrl.catalog"
                            data-offers="$ctrl.availableOffers"
                            data-current-offer="$ctrl.hosting.offer"
                            data-customer-region="$ctrl.coreConfig.getRegion()"
                            data-show-details="true"
                            data-hide-price="true"
                            data-on-group-offer-click="$ctrl.onHostingGroupOfferClick(groupOffer, versionOffer)"
                        >
                        </web-component-hosting-domain-offers>
                    </oui-step-form>

                    <oui-step-form
                        data-header="{{:: 'hosting_order_upgrade_step_header_duration' | translate }}"
                        data-description="{{:: 'hosting_order_upgrade_select_duration' | translate }}"
                        data-on-focus="$ctrl.getDurations()"
                        data-loading="$ctrl.loading.durations"
                        data-valid="$ctrl.durations && $ctrl.model.duration"
                        data-prevent-next="true"
                    >
                        <oui-radio-group
                            data-required
                            data-model="$ctrl.model.duration"
                        >
                            <oui-radio data-value="$ctrl.durations">
                                <span
                                    data-ng-bind-html="$ctrl.constructor.formatExpirationDate($ctrl.hosting.expiration) | wucDuration:'longDate':{prorata:true}"
                                ></span>
                                &nbsp;:
                                <span
                                    data-ng-bind-html="$ctrl.durations.order.prices | price: $ctrl.ovhSubsidiary"
                                ></span>
                            </oui-radio>
                        </oui-radio-group>
                        <p
                            class="mt-2"
                            data-ng-if="$ctrl.getMonthlyRenewalPrice()"
                            data-translate="hosting_order_upgrade_renewal_after"
                            data-translate-values="{ price: $ctrl.getMonthlyRenewalPrice() }"
                        ></p>
                    </oui-step-form>

                    <oui-step-form
                        data-header="{{:: 'hosting_order_upgrade_step_header_start_time' | translate }}"
                        data-position="2"
                        data-ng-if="$ctrl.hosting.isCloudWeb"
                    >
                        <oui-field
                            data-label="{{:: 'hosting_order_upgrade_start_time_label' | translate }}"
                            data-label-popover="{{:: 'hosting_order_upgrade_start_time_explain' | translate }}"
                        >
                            <oui-timepicker
                                data-inline
                                data-format="H:i:S"
                                data-model="$ctrl.model.startTime"
                            >
                            </oui-timepicker>
                            <p
                                data-ng-bind="$ctrl.formatTime($ctrl.model.startTime)"
                            ></p>
                        </oui-field>
                        <oui-message data-type="info">
                            <span
                                data-translate="hosting_order_upgrade_start_time_info"
                            ></span>
                        </oui-message>
                    </oui-step-form>

                    <oui-step-form
                        data-header="{{:: 'hosting_order_upgrade_step_header_contracts' | translate }}"
                        data-valid="$ctrl.model.agree || !$ctrl.durations.order.contracts.length"
                    >
                        <ovh-contracts-summary
                            name="agreeContracts"
                            data-ng-if="$ctrl.durations.order.contracts.length"
                            data-items="$ctrl.durations.order.contracts"
                            data-model="$ctrl.model.agree"
                        >
                        </ovh-contracts-summary>
                        <span
                            data-ng-if="!$ctrl.durations.order.contracts.length"
                            data-translate="hosting_order_upgrade_no_contract"
                        ></span>
                    </oui-step-form>
                </oui-stepper>
            </div>

            <!-- RIGHT: Sticky order summary -->
            <aside style="width: 320px; min-width: 320px; flex-shrink: 0; position: sticky; top: 24px;">
                <div style="border: 1px solid #e5e7eb; border-radius: 8px; background: #fff; overflow: hidden;">

                    <!-- Empty state -->
                    <div
                        data-ng-if="!$ctrl.durations"
                        style="display: flex; align-items: center; justify-content: center; gap: 8px; padding: 24px;"
                    >
                        <oui-icon data-name="oui-icon-cart" data-aria-hidden></oui-icon>
                        <span
                            class="oui-heading_5"
                            data-translate="hosting_order_upgrade_summary_empty"
                        ></span>
                    </div>

                    <!-- Filled state: same data as step 4 resume -->
                    <div
                        data-ng-if="$ctrl.durations"
                        style="padding: 20px; display: flex; flex-direction: column; gap: 0;"
                    >
                        <span class="oui-heading_5" style="margin-bottom: 12px;"
                            data-translate="hosting_order_upgrade_resume"
                        ></span>

                        <!-- Order details (same as step 4 table) -->
                        <div
                            data-ng-repeat="detail in $ctrl.durations.order.details track by $index"
                            style="display: flex; justify-content: space-between; align-items: baseline; padding: 6px 0; border-bottom: 1px solid #f3f4f6; font-size: 13px;"
                        >
                            <span style="flex: 1; min-width: 0; margin-right: 8px;"
                                data-ng-bind="detail.description"
                            ></span>
                            <strong style="white-space: nowrap;"
                                data-ng-bind-html="$ctrl.formatPrice(detail.totalPrice)"
                            ></strong>
                        </div>

                        <!-- Prices HT / TTC -->
                        <div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid #e5e7eb;">
                            <div style="display: flex; justify-content: space-between; align-items: baseline;">
                                <span style="font-weight: 700;"
                                    data-translate="hosting_order_upgrade_price_HT"
                                ></span>
                                <span style="font-weight: 700; color: #0050d7;"
                                    data-ng-bind="$ctrl.durations.order.prices.withoutTax.text"
                                ></span>
                            </div>
                            <div style="display: flex; justify-content: space-between; align-items: baseline; margin-top: 4px;">
                                <span style="font-weight: 700;"
                                    data-translate="hosting_order_upgrade_price_TTC"
                                ></span>
                                <span style="font-weight: 700;"
                                    data-ng-bind="$ctrl.durations.order.prices.withTax.text"
                                ></span>
                            </div>
                        </div>

                        <!-- Info message -->
                        <div style="margin-top: 12px;">
                            <oui-message data-type="info">
                                <span
                                    data-translate="hosting_order_upgrade_do_order"
                                    data-ng-if="!$ctrl.hosting.isCloudWeb"
                                ></span>
                                <span
                                    data-translate="hosting_order_upgrade_do_order_cloudweb"
                                    data-ng-if="$ctrl.hosting.isCloudWeb"
                                ></span>
                            </oui-message>
                        </div>
                    </div>

                    <!-- CTA button -->
                    <button
                        type="button"
                        class="oui-button oui-button_secondary w-100"
                        style="border-radius: 0; border: none; border-top: 1px solid #e5e7eb; padding: 16px; background: #f3f4f6;"
                        data-ng-disabled="!$ctrl.model.offer || !$ctrl.durations || $ctrl.loading.validation || (!$ctrl.model.agree && $ctrl.durations.order.contracts.length)"
                        data-ng-click="$ctrl.orderUpgrade()"
                    >
                        <span data-translate="hosting_order_upgrade_summary_cta"></span>
                        <oui-icon data-name="oui-icon-arrow-right" data-aria-hidden></oui-icon>
                    </button>
                </div>
            </aside>
        </div>

        <!-- ═══════════════════════════════════════════════════════════ -->
        <!-- LEGACY LAYOUT: Standard stepper (no feature flag)         -->
        <!-- ═══════════════════════════════════════════════════════════ -->
        <oui-stepper
            data-ng-if="!$ctrl.useNewOffers
                        && !$ctrl.loading.availableOffers
                        && !$ctrl.loading.validation
                        && $ctrl.availableOffers.length > 0"
            data-on-finish="$ctrl.orderUpgrade()"
        >
            <oui-step-form
                data-header="{{:: 'hosting_order_upgrade_step_header_offer' | translate }}"
                data-valid="$ctrl.model.offer"
                data-prevent-next="true"
                data-on-submit="$ctrl.onOfferNextStepClick()"
            >
                <web-component-hosting-domain-offers
                    data-ng-if="$ctrl.catalog"
                    data-user="$ctrl.user"
                    data-catalog="$ctrl.catalog"
                    data-offers="$ctrl.availableOffers"
                    data-current-offer="$ctrl.hosting.offer"
                    data-customer-region="$ctrl.coreConfig.getRegion()"
                    data-show-details="true"
                    data-on-group-offer-click="$ctrl.onHostingGroupOfferClick(groupOffer, versionOffer)"
                >
                </web-component-hosting-domain-offers>
            </oui-step-form>

            <oui-step-form
                data-header="{{:: 'hosting_order_upgrade_step_header_duration' | translate }}"
                data-description="{{:: 'hosting_order_upgrade_select_duration' | translate }}"
                data-on-focus="$ctrl.getDurations()"
                data-loading="$ctrl.loading.durations"
                data-valid="$ctrl.durations && $ctrl.model.duration"
                data-prevent-next="true"
            >
                <oui-radio-group
                    data-required
                    data-model="$ctrl.model.duration"
                >
                    <oui-radio data-value="$ctrl.durations">
                        <span
                            data-ng-bind-html="$ctrl.constructor.formatExpirationDate($ctrl.hosting.expiration) | wucDuration:'longDate':{prorata:true}"
                        ></span>
                        &nbsp;:
                        <span
                            data-ng-bind-html="$ctrl.durations.order.prices | price: $ctrl.ovhSubsidiary"
                        ></span>
                    </oui-radio>
                </oui-radio-group>
            </oui-step-form>

            <oui-step-form
                data-header="{{:: 'hosting_order_upgrade_step_header_start_time' | translate }}"
                data-position="2"
                data-ng-if="$ctrl.hosting.isCloudWeb"
            >
                <oui-field
                    data-label="{{:: 'hosting_order_upgrade_start_time_label' | translate }}"
                    data-label-popover="{{:: 'hosting_order_upgrade_start_time_explain' | translate }}"
                >
                    <oui-timepicker
                        data-inline
                        data-format="H:i:S"
                        data-model="$ctrl.model.startTime"
                    >
                    </oui-timepicker>
                    <p
                        data-ng-bind="$ctrl.formatTime($ctrl.model.startTime)"
                    ></p>
                </oui-field>
                <oui-message data-type="info">
                    <span
                        data-translate="hosting_order_upgrade_start_time_info"
                    ></span>
                </oui-message>
            </oui-step-form>

            <oui-step-form
                data-header="{{:: 'hosting_order_upgrade_step_header_contracts' | translate }}"
                data-valid="$ctrl.model.agree || !$ctrl.durations.order.contracts.length"
            >
                <ovh-contracts-summary
                    name="agreeContracts"
                    data-ng-if="$ctrl.durations.order.contracts.length"
                    data-items="$ctrl.durations.order.contracts"
                    data-model="$ctrl.model.agree"
                >
                </ovh-contracts-summary>
                <span
                    data-ng-if="!$ctrl.durations.order.contracts.length"
                    data-translate="hosting_order_upgrade_no_contract"
                ></span>
            </oui-step-form>

            <oui-step-form
                data-header="{{:: 'hosting_order_upgrade_resume' | translate }}"
            >
                <table class="table table-condensed">
                    <tbody>
                        <tr
                            data-ng-repeat="detail in $ctrl.durations.order.details track by $index"
                        >
                            <th
                                class="font-weight-normal"
                                scope="row"
                                data-ng-bind="detail.description"
                            ></th>
                            <td class="text-nowrap text-right">
                                <strong
                                    data-ng-bind-html="$ctrl.formatPrice(detail.totalPrice)"
                                ></strong>
                            </td>
                        </tr>
                    </tbody>
                    <tfoot>
                        <tr>
                            <th
                                class="text-right"
                                scope="row"
                                data-translate="hosting_order_upgrade_price_HT"
                            ></th>
                            <td
                                class="font-weight-bold text-right"
                                data-ng-bind="$ctrl.durations.order.prices.withoutTax.text"
                            ></td>
                        </tr>
                        <tr>
                            <th
                                scope="row"
                                class="text-right"
                                data-translate="hosting_order_upgrade_price_TTC"
                            ></th>
                            <td
                                class="font-weight-bold text-right"
                                data-ng-bind="$ctrl.durations.order.prices.withTax.text"
                            ></td>
                        </tr>
                    </tfoot>
                </table>
                <oui-message data-type="info">
                    <span
                        data-translate="hosting_order_upgrade_do_order"
                        data-ng-if="!$ctrl.hosting.isCloudWeb"
                    ></span>
                    <span
                        data-translate="hosting_order_upgrade_do_order_cloudweb"
                        data-ng-if="$ctrl.hosting.isCloudWeb"
                    ></span>
                </oui-message>
                <oui-message
                    data-type="warning"
                    data-ng-if=":: $ctrl.hasFreedom()"
                >
                    <strong
                        data-translate="hosting_order_upgrade_freedom_warning"
                    ></strong>
                    <span
                        data-translate="hosting_order_upgrade_freedom_warning_text"
                    ></span>
                </oui-message>
            </oui-step-form>
        </oui-stepper>
    </div>
</div>
