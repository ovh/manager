<div class="dedicatedCloud-datacenter-virtualmachines">
    <h2 data-translate="virtualmachine_title"></h2>
    <div class="text-center" data-ng-if="$ctrl.loading">
        <oui-spinner></oui-spinner>
    </div>
    <div data-ng-if="!$ctrl.loading">
        <oui-datagrid data-rows-loader="$ctrl.loadVirtualMachines($config)">
            <oui-datagrid-column
                data-title=":: 'virtualmachine_grid_name' | translate"
                data-property="name"
            >
            </oui-datagrid-column>

            <oui-datagrid-column
                data-title=":: 'virtualmachine_grid_guest_os' | translate"
                data-property="guestOsFamily"
            >
            </oui-datagrid-column>

            <oui-datagrid-column
                data-title=":: 'virtualmachine_grid_license' | translate"
            >
                <span
                    class="oui-badge oui-badge_info"
                    data-ng-if="$row.license"
                    data-ng-bind="$row.license"
                >
                </span>
                <span
                    data-ng-if="!$row.license"
                    class="oui-badge oui-badge_error"
                    data-translate="virtualmachine_deactivated"
                >
                </span>
                <span
                    data-ng-if="!$row.allowEditLicense"
                    class="oui-icon oui-icon-help-circle"
                    title="{{:: 'vitualmachine_unavailable_tooltip' | translate}}"
                    oui-tooltip
                >
                </span>
            </oui-datagrid-column>

            <oui-action-menu
                data-compact
                data-placement="end"
                data-ng-if="$row.allowEditLicense"
            >
                <oui-action-menu-item
                    data-ng-if="!$row.license && $row.allowEditLicense"
                    ><span
                        data-translate="virtualmachine_action_activate_license"
                    >
                    </span
                ></oui-action-menu-item>
                <oui-action-menu-item data-ng-if="$row.license"
                    ><span
                        data-translate="virtualmachine_action_deactivate_license"
                    >
                    </span
                ></oui-action-menu-item>
            </oui-action-menu>
        </oui-datagrid>
    </div>
</div>
