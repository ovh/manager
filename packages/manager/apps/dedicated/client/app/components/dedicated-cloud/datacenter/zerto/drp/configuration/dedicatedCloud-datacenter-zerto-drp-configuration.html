<!-- Notifications -->
<oui-message
    class="mb-3"
    data-type="success"
    data-ng-if="$ctrl.formattedState === $ctrl.DRP_STATUS.delivered && $ctrl.zertoState.drpType === $ctrl.DRP_OPTIONS.ovh"
>
    <span
        data-ng-bind="('dedicatedCloud_datacenter_zerto_drp_configuration_notification_delivered_ovh_' + $ctrl.pccType) | translate:{ pccId: $ctrl.zertoState.remoteSiteInformation.serviceName }"
    ></span>
    <span
        data-ng-if="$ctrl.currentUser.email"
        data-ng-bind-html="'dedicatedCloud_datacenter_zerto_drp_configuration_notification_delivered_description' | translate: { email: $ctrl.currentUser.email }"
    ></span>
</oui-message>

<oui-message
    class="mb-3"
    data-type="success"
    data-ng-if="$ctrl.formattedState === $ctrl.DRP_STATUS.delivered && $ctrl.zertoState.drpType === $ctrl.DRP_OPTIONS.onPremise"
>
    <span data-translate="dedicatedCloud_datacenter_zerto_drp_configuration_notification_delivered_onPremise"></span>
    <span
        data-ng-if="$ctrl.currentUser.email"
        data-ng-bind-html="'dedicatedCloud_datacenter_zerto_drp_configuration_notification_delivered_description' | translate: { email: $ctrl.currentUser.email }"
    ></span>
</oui-message>

<oui-message
    class="mb-3"
    data-type="info"
    data-dismissible="false"
    data-ng-if="$ctrl.formattedState === $ctrl.DRP_STATUS.delivering"
>
    <span
        data-ng-bind="('dedicatedCloud_datacenter_zerto_drp_configuration_notification_delivering_' + $ctrl.pccType) | translate"
    ></span>
</oui-message>

<oui-message
    class="mb-3"
    data-type="warning"
    data-dismissible="false"
    data-ng-if="$ctrl.zertoState.vpnStatus === 'notConfigured' && $ctrl.zertoState.drpType === $ctrl.DRP_OPTIONS.onPremise"
>
    <span data-translate="dedicatedCloud_datacenter_zerto_drp_configuration_notification_vpn_warning"></span>
</oui-message>

                            <dd class="oui-tile__description">

                                </span>
                                <span data-ng-if="$ctrl.serviceInfos && $ctrl.serviceInfos.hasError">
                                    <oui-message data-type="error">
                                        <span data-translate="dedicatedCloud_datacenter_zerto_drp_configuration_card_subscription_error"></span>
                                    </oui-message>
                                </span>
                                <span
                                    data-ng-if="$ctrl.serviceInfos && !$ctrl.serviceInfos.hasError && $ctrl.serviceInfos.status === 'ok'"
                                    class="oui-badge oui-badge_success"

                                ></span>
