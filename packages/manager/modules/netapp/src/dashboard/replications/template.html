<section
    ng-repeat="(type, rows) in $ctrl.replications track by $index"
    ng-if="type === $ctrl.ongoingStatus || type !== $ctrl.ongoingStatus && rows.length"
>
    <h1
        class="oui-header__title mb-3"
        data-translate="{{'netapp_replications_title_' + type}}"
    ></h1>
    <p
        ng-if="type === $ctrl.ongoingStatus"
        data-translate="netapp_replications_information"
    ></p>
    <oui-datagrid data-rows="rows">
        <oui-datagrid-column
            data-title=":: 'netapp_replications_id' | translate"
            data-property="id"
        >
            <p data-ng-bind="$row.id"></p>
            <p data-ng-bind="$row.description"></p>
        </oui-datagrid-column>
        <oui-datagrid-column
            data-title=":: 'netapp_replications_source_efs_id' | translate"
            data-property="source"
            data-prevent-customization
        >
            <a
                href
                ng-if="$row.source.serviceID === $ctrl.serviceName"
                data-translate="netapp_replications_efs_link_current"
                data-translate-value-shareid="{{$row.source.shareID}}"
                data-ng-click="$ctrl.goToVolumeDetails($row.source.shareID)"
            ></a>
            <a
                href
                ng-if="$row.destination.serviceID === $ctrl.serviceName"
                data-translate="netapp_replications_efs_link_not_current"
                data-translate-value-shareid="{{$row.source.shareID}}"
                data-translate-value-serviceid="{{$row.source.serviceID}}"
                data-ng-click="$ctrl.goToVolumeDetails($row.source.shareID)"
            ></a>
            <p data-ng-bind="$ctrl.sourceEFSNames[$row.source.serviceID]"></p>
        </oui-datagrid-column>
        <oui-datagrid-column
            data-title=":: 'netapp_replications_destination_efs_id' | translate"
            data-property="destination"
            data-prevent-customization
        >
            <a
                href
                ng-if="$row.destination.shareID && $row.destination.serviceID === $ctrl.serviceName"
                data-translate="netapp_replications_efs_link_current"
                data-translate-value-shareid="{{$row.destination.shareID}}"
                data-ng-click="$ctrl.goToVolumeDetails($row.destination.shareID)"
            ></a>
            <a
                href
                ng-if="$row.destination.shareID && $row.source.serviceID === $ctrl.serviceName"
                data-translate="netapp_replications_efs_link_not_current"
                data-translate-value-shareid="{{$row.destination.shareID}}"
                data-translate-value-serviceid="{{$row.destination.serviceID}}"
                data-ng-click="$ctrl.goToVolumeDetails($row.destination.shareID)"
            ></a>
            <span ng-if="!$row.destination.shareID">-</span>
            <p
                data-ng-bind="$ctrl.sourceEFSNames[$row.destination.serviceID]"
            ></p>
        </oui-datagrid-column>
        <oui-datagrid-column
            data-title=":: 'netapp_replications_status' | translate"
            data-property="status"
            data-prevent-customization
        >
            <span
                class="{{ 'oui-badge oui-badge_' + $ctrl.status[$row.status].color }}"
                data-translate="{{ 'netapp_replications_status_' + $ctrl.status[$row.status].wording }}"
            >
            </span>
            <span
                class="fa fa-info-circle small"
                data-ng-if="$row.status === 'pending'"
                data-oui-tooltip="{{:: 'netapp_replications_pending_help' | translate }}"
                data-oui-tooltip-placement="bottom"
            >
            </span>
        </oui-datagrid-column>
        <oui-datagrid-column
            data-title=":: 'netapp_replications_progress' | translate"
            data-property="progress"
            data-prevent-customization
        >
            <div class="oui-progress">
                <div
                    class="oui-progress__bar oui-progress__bar_info"
                    role="progressbar"
                    aria-valuemin="0"
                    aria-valuemax="100"
                    data-ng-style="{ 'width': $row.progress }"
                ></div>
            </div>
        </oui-datagrid-column>
    </oui-datagrid>
</section>
<section ng-if="!$ctrl.hasReplications">
    <h1
        class="oui-header__title mb-3"
        data-translate="{{'netapp_replications_title_no_replication'}}"
    ></h1>
    <p data-translate="netapp_replications_information"></p>
</section>
